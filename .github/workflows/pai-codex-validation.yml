name: PAI Codex Validation

on:
  workflow_dispatch:
  push:
    branches:
      - pai-codex-flawless-runtime
      - pai-codex-windows-installer
  pull_request:
    paths:
      - ".github/workflows/pai-codex-validation.yml"
      - "README.md"
      - "Releases/v5.0.0/**"

jobs:
  validate:
    name: validate (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2

      - name: Run Codex branch validation
        run: bun Releases/v5.0.0/.claude/PAI/TOOLS/CodexBranchValidation.ts
